<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OSW APAC Convening 2026 — Partner map</title>

  <!-- Leaflet (map library, BSD-2). Pinned version. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ---- Brand tokens -------------------------------------------------
       Confirm --iri-red against the brand guide before publishing.
       Everything visual keys off these variables, so changing the hex
       here re-skins the whole component. */
    :root {
      --iri-red: #b11116;        /* placeholder — set to the brand red */
      --iri-red-soft: #f3d7d8;
      --ink: #1c1c1c;
      --muted: #6b6b6b;
      --line: #e3e3e3;
      --bg: #ffffff;
      --chip-bg: #f4f4f4;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.45;
      font-size: 15px;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 18px 16px 40px; }

    /* ---- Filter bar -------------------------------------------------- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      align-items: flex-end;
      margin-bottom: 14px;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-label {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s ease;
    }
    .pill:hover { border-color: var(--iri-red); }
    .pill.active {
      background: var(--iri-red);
      border-color: var(--iri-red);
      color: #fff;
    }
    .pill .n { opacity: 0.7; margin-left: 4px; font-variant-numeric: tabular-nums; }
    select {
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      min-width: 220px;
    }

    /* ---- Map -------------------------------------------------------- */
    #map {
      height: 380px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-bottom: 16px;
      background: #f7f7f7;
    }
    .count-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      text-shadow: 0 1px 1px rgba(0,0,0,0.25);
    }
    .leaflet-tooltip.country-name {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 600;
      box-shadow: none;
    }

    /* ---- Results --------------------------------------------------- */
    .resultline {
      font-size: 13px;
      color: var(--muted);
      margin: 4px 0 12px;
    }
    .resultline b { color: var(--ink); }
    .clear {
      margin-left: 10px;
      color: var(--iri-red);
      cursor: pointer;
      text-decoration: underline;
      font-size: 12px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 15px;
      background: #fff;
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.3;
    }
    .card h3 a { color: var(--ink); text-decoration: none; }
    .card h3 a:hover { color: var(--iri-red); text-decoration: underline; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--iri-red-soft);
      color: var(--iri-red);
      font-weight: 600;
    }
    .badge.country { background: #ededed; color: #444; }
    .topics { display: flex; flex-wrap: wrap; gap: 5px; }
    .topic {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--chip-bg);
      color: #555;
    }
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 30px 10px;
      border: 1px dashed var(--line);
      border-radius: 10px;
    }
    .errbox {
      padding: 16px;
      border: 1px solid var(--iri-red);
      background: var(--iri-red-soft);
      border-radius: 10px;
      color: var(--iri-red);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <div class="control-group">
        <span class="control-label">Location — click the map or a chip</span>
        <div class="pills" id="countryPills"></div>
      </div>
      <div class="control-group">
        <span class="control-label">Organisation type</span>
        <select id="typeSelect"><option value="">All types</option></select>
      </div>
    </div>

    <div id="map"></div>

    <div class="resultline" id="resultline"></div>
    <div class="cards" id="cards"></div>
  </div>

  <script>
    /* ----------------------------------------------------------------
       Geographic anchors for the clickable markers. Only countries with
       coordinates get a map marker; everything else (e.g. "Regional")
       still appears as a clickable chip. To add a country later, give it
       an entry here and add matching rows in orgs.json.
       ---------------------------------------------------------------- */
    const COUNTRY_GEO = {
      "Japan":  { label: "Japan",  coords: [36.2, 138.25] },
      "Korea":  { label: "Korea",  coords: [36.4, 127.80] },
      "Taiwan": { label: "Taiwan", coords: [23.7, 121.00] }
    };
    const NON_GEO_LABELS = { "Regional": "Regional / multi-country" };

    let DATA = [];
    let state = { country: null, type: null };
    let map, markerLayer;

    const $ = (id) => document.getElementById(id);

    function countryLabel(c) {
      return (COUNTRY_GEO[c] && COUNTRY_GEO[c].label) || NON_GEO_LABELS[c] || c;
    }

    function init(data) {
      DATA = data;
      buildMap();
      buildTypeSelect();
      buildCountryPills();
      render();
    }

    /* ---- Map ------------------------------------------------------- */
    function buildMap() {
      map = L.map('map', { scrollWheelZoom: false, zoomControl: true })
             .setView([35.5, 132.0], 4);
      L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        { attribution: '&copy; OpenStreetMap, &copy; CARTO', subdomains: 'abcd', maxZoom: 10 }
      ).addTo(map);
      markerLayer = L.layerGroup().addTo(map);
      drawMarkers();
    }

    function countsByCountry() {
      const counts = {};
      DATA.forEach(o => { counts[o.country] = (counts[o.country] || 0) + 1; });
      return counts;
    }

    function drawMarkers() {
      markerLayer.clearLayers();
      const counts = countsByCountry();
      Object.keys(counts).forEach(country => {
        const geo = COUNTRY_GEO[country];
        if (!geo) return; // non-geographic — represented by its chip only
        const n = counts[country];
        const active = state.country === country;
        const m = L.circleMarker(geo.coords, {
          radius: 12 + n * 3,
          color: '#ffffff',
          weight: 2,
          fillColor: getComputedStyle(document.documentElement)
                       .getPropertyValue('--iri-red').trim(),
          fillOpacity: active ? 1 : 0.78
        });
        m.bindTooltip(String(n), { permanent: true, direction: 'center', className: 'count-label' });
        m.bindTooltip(geo.label, { direction: 'top', className: 'country-name', offset: [0, -6] });
        m.on('click', () => toggleCountry(country));
        m.addTo(markerLayer);
      });
    }

    /* ---- Filter controls ------------------------------------------ */
    function buildTypeSelect() {
      const sel = $('typeSelect');
      const types = [...new Set(DATA.map(o => o.type))].sort();
      types.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => { state.type = sel.value || null; render(); });
    }

    function buildCountryPills() {
      const counts = countsByCountry();
      const box = $('countryPills');
      box.innerHTML = '';

      const all = document.createElement('button');
      all.className = 'pill';
      all.dataset.country = '';
      all.textContent = 'All locations';
      box.appendChild(all);

      Object.keys(counts).sort().forEach(country => {
        const b = document.createElement('button');
        b.className = 'pill';
        b.dataset.country = country;
        b.innerHTML = countryLabel(country) + ' <span class="n">' + counts[country] + '</span>';
        box.appendChild(b);
      });

      box.querySelectorAll('.pill').forEach(p => {
        p.addEventListener('click', () => {
          const c = p.dataset.country;
          if (!c) { state.country = null; } else { toggleCountry(c, true); return; }
          render();
        });
      });
    }

    function toggleCountry(country, fromPill) {
      state.country = (state.country === country) ? null : country;
      render();
    }

    /* ---- Render ---------------------------------------------------- */
    function render() {
      // sync pills
      document.querySelectorAll('#countryPills .pill').forEach(p => {
        const c = p.dataset.country;
        const on = (c === '' && !state.country) || (c && c === state.country);
        p.classList.toggle('active', on);
      });
      // redraw markers so the active one reads as selected
      drawMarkers();

      const rows = DATA.filter(o =>
        (!state.country || o.country === state.country) &&
        (!state.type || o.type === state.type)
      );
      renderCards(rows);
      renderResultLine(rows.length);
    }

    function renderResultLine(n) {
      const parts = [];
      parts.push('Showing <b>' + n + '</b> of <b>' + DATA.length + '</b> organisations');
      const filt = [];
      if (state.country) filt.push(countryLabel(state.country));
      if (state.type) filt.push(state.type);
      let html = parts.join('');
      if (filt.length) {
        html += ' — ' + filt.join(' · ') +
                ' <span class="clear" id="clearBtn">clear filters</span>';
      }
      $('resultline').innerHTML = html;
      const cb = $('clearBtn');
      if (cb) cb.addEventListener('click', () => { state = { country: null, type: null }; document.getElementById('typeSelect').value = ''; render(); });
    }

    function renderCards(rows) {
      const box = $('cards');
      box.innerHTML = '';
      if (!rows.length) {
        box.innerHTML = '<div class="empty">No organisations match this combination.</div>';
        return;
      }
      rows.forEach(o => {
        const card = document.createElement('div');
        card.className = 'card';
        const title = o.url
          ? '<a href="' + o.url + '" target="_blank" rel="noopener">' + o.name + '</a>'
          : o.name;
        const topics = (o.topics || [])
          .map(t => '<span class="topic">' + t + '</span>').join('');
        card.innerHTML =
          '<h3>' + title + '</h3>' +
          '<div class="badges">' +
            '<span class="badge country">' + countryLabel(o.country) + '</span>' +
            '<span class="badge">' + o.type + '</span>' +
          '</div>' +
          '<div class="topics">' + topics + '</div>';
        box.appendChild(card);
      });
    }

    /* ---- Load data ------------------------------------------------- */
    fetch('orgs.json')
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(init)
      .catch(err => {
        document.querySelector('.wrap').innerHTML =
          '<div class="errbox">Could not load <code>orgs.json</code> (' + err.message +
          ').<br>If you are previewing locally, run a small server in this folder ' +
          '(<code>python3 -m http.server</code>) rather than opening the file directly. ' +
          'On GitHub Pages it loads normally.</div>';
      });
  </script>
</body>
</html>
